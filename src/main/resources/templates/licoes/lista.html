<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Lições</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between">

        <h2>Lições</h2>

        <a
                class="btn btn-primary"
                th:href="@{/licoes/nova}">

            Nova Lição

        </a>

    </div>

    <hr>

    <table class="table table-hover">

        <thead>

        <tr>

            <th>ID</th>

            <th>Título</th>

            <th>Dificuldade</th>

            <th></th>

        </tr>

        </thead>

        <tbody>

        <tr
                th:each="licao : ${licoes}">

            <td th:text="${licao.id}"></td>

            <td th:text="${licao.titulo}"></td>

            <td th:text="${licao.dificuldade}"></td>

            <td>

                <a class="btn btn-primary btn-sm"
                   th:href="@{'/licoes/' + ${licao.id}}">
                    Ler
                </a>

                <a class="btn btn-warning btn-sm"
                   th:href="@{'/licoes/editar/' + ${licao.id}}">
                    Editar
                </a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{'/licoes/excluir/' + ${licao.id}}">
                    Excluir
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
