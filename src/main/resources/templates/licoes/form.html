<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Nova Lição</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>Nova Lição</h2>

    <hr>

    <form
            th:object="${licao}"
            th:action="@{/licoes/salvar}"
            method="post">

        <input
                type="hidden"
                th:field="*{id}">

        <div class="mb-3">

            <label>Título</label>

            <input
                    class="form-control"
                    th:field="*{titulo}">

        </div>

        <div class="mb-3">

            <label>Dificuldade</label>

            <select
                    class="form-select"
                    th:field="*{dificuldade}">

                <option
                        th:each="nivel : ${T(com.samukaoliveira.lingSam.models.NivelDificuldade).values()}"
                        th:value="${nivel}"
                        th:text="${nivel}">
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>Texto</label>

            <textarea
                    rows="15"
                    class="form-control"
                    th:field="*{textoOriginal}">
            </textarea>

        </div>

        <button
                class="btn btn-success">

            Salvar

        </button>

        <a
                th:href="@{/licoes}"
                class="btn btn-secondary">

            Cancelar

        </a>

    </form>

</div>

</body>

</html>
