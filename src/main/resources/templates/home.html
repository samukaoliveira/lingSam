<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>LingStudy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2">

            <div th:replace="fragments/sidebar :: sidebar"></div>

        </div>

        <div class="col-md-10">

            <div class="container mt-4">

                <h2>Dashboard</h2>

                <hr>

                <div class="row">

                    <div class="col-md-3">

                        <div class="card text-bg-success">

                            <div class="card-body">

                                <h5>Dominadas</h5>

                                <h2 th:text="${dashboard.dominadas}">0</h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-bg-warning">

                            <div class="card-body">

                                <h5>Aprendendo</h5>

                                <h2 th:text="${dashboard.aprendendo}">0</h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-bg-info">

                            <div class="card-body">

                                <h5>Familiar</h5>

                                <h2 th:text="${dashboard.familiares}">0</h2>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <div class="card text-bg-secondary">

                            <div class="card-body">

                                <h5>Novas</h5>

                                <h2 th:text="${dashboard.novas}">0</h2>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="card mt-4">

                    <div class="card-header">
                        Bem-vindo
                    </div>

                    <div class="card-body">
                        Sua jornada de aprendizado começa aqui.
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
