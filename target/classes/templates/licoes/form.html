<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Nova Lição</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid">

    <div class="row">

        <div class="col-md-2">

            <div th:replace="fragments/sidebar :: sidebar"></div>

        </div>

        <div class="col-md-10">

            <div class="container mt-4">

                <h2 th:text="${licao.id == null ? 'Nova Lição' : 'Editar Lição'}"></h2>

                <hr>

                <div class="card shadow-sm">

                    <div class="card-body">

                        <form
                                th:object="${licao}"
                                th:action="@{/licoes/salvar}"
                                method="post">

                            <input type="hidden"
                                   th:field="*{id}">

                            <div class="mb-3">

                                <label class="form-label">

                                    Título

                                </label>

                                <input class="form-control"
                                       th:field="*{titulo}">

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Dificuldade

                                </label>

                                <select class="form-select"
                                        th:field="*{dificuldade}">

                                    <option
                                            th:each="nivel : ${T(com.samukaoliveira.lingSam.models.NivelDificuldade).values()}"
                                            th:value="${nivel}"
                                            th:text="${nivel}">
                                    </option>

                                </select>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">

                                    Texto

                                </label>

                                <textarea
                                        rows="18"
                                        class="form-control"
                                        th:field="*{textoOriginal}">
                                </textarea>

                            </div>

                            <button class="btn btn-success"
                                    type="submit">

                                Salvar

                            </button>

                            <a class="btn btn-secondary"
                               th:href="@{/licoes}">

                                Cancelar

                            </a>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
