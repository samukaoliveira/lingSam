<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">

  <title th:text="${licao.titulo}"></title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link th:href="@{/css/app.css}" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

  <div class="d-flex justify-content-between">

    <div>

      <h2 th:text="${licao.titulo}"></h2>

      <span class="badge bg-primary"
            th:text="${licao.dificuldade}">
            </span>

    </div>

    <a class="btn btn-secondary"
       th:href="@{/licoes}">
      Voltar
    </a>

  </div>

  <hr>

  <div class="card shadow-sm">

    <div class="card-body">

      <th:block th:each="token : ${palavras}">

        <!-- Palavra -->
        <span
                th:if="${token.tipo == T(com.samukaoliveira.lingSam.models.TipoToken).PALAVRA}"
                class="word"
                th:classappend="${token.status != null ? ' ' + #strings.toLowerCase(token.status.name()) : ''}"
                th:text="${token.texto}"
                th:attr="data-id=${token.id},data-word=${token.texto}"
                data-bs-toggle="modal"
                data-bs-target="#wordModal">
        </span>

        <!-- Pontuação -->
        <span
                th:if="${token.tipo == T(com.samukaoliveira.lingSam.models.TipoToken).PONTUACAO}"
                th:text="${token.texto}">
        </span>

        <!-- Espaço -->
        <th:block
                th:if="${token.tipo == T(com.samukaoliveira.lingSam.models.TipoToken).ESPACO}">
          <span class="card-span-espaco">&#32;</span>
        </th:block>

        <!-- Quebra de linha -->
        <br
                th:if="${token.tipo == T(com.samukaoliveira.lingSam.models.TipoToken).QUEBRA_LINHA}"/>

      </th:block>

    </div>

  </div>

</div>

<!-- Modal -->

<div class="modal fade"
     id="wordModal"
     tabindex="-1">

  <div class="modal-dialog">

    <div class="modal-content">

      <div class="modal-header">

        <h5 id="tituloPalavra">

          Palavra

        </h5>

        <button
                class="btn-close"
                data-bs-dismiss="modal">
        </button>

      </div>

      <div class="modal-body">

        <p>

          Familiaridade

        </p>

        <div class="form-check">

          <input
                  class="form-check-input"
                  type="radio"
                  name="status"
                  value="NOVA">

          Nova

        </div>

        <div class="form-check">

          <input
                  class="form-check-input"
                  type="radio"
                  name="status"
                  value="FAMILIAR">

          Familiar

        </div>

        <div class="form-check">

          <input
                  class="form-check-input"
                  type="radio"
                  name="status"
                  value="APRENDENDO">

          Aprendendo

        </div>

        <div class="form-check">

          <input
                  class="form-check-input"
                  type="radio"
                  name="status"
                  value="DOMINADA">

          Dominada

        </div>

      </div>

      <div class="modal-footer">

        <button id="btnSalvar"
                class="btn btn-success">

          Salvar

        </button>

      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/app.js}"></script>

</body>

</html>
